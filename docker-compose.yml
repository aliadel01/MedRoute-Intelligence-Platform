version: '3.8'

networks:
  streaming-net:
    driver: bridge

volumes:
  redpanda-data:

services:
  # --- Redpanda Broker (Kafka Alternative) ---
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda-0
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr=plaintext://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=plaintext://redpanda-0:29092,external://localhost:9092
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    ports:
      - "9092:9092"
    networks:
      - streaming-net

  # --- Redpanda Console (The Web UI) ---
  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    entrypoint: /bin/sh -c "sleep 5 && /app/console"
    environment:
      - KAFKA_BROKERS=redpanda-0:29092
    ports:
      - "8080:8080"
    networks:
      - streaming-net
    depends_on:
      - redpanda

  python-incident-simulator:
    build:
      context: ./simulator/incident-simulator
      dockerfile: Dockerfile
    container_name: python-simulator
    command: python incident_simulator.py
    networks:
      - streaming-net
    depends_on:
      - redpanda